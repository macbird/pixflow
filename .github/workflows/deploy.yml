name: Deploy to Square Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      API_PUBLIC_BASE_URL: https://pixflow.squareweb.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Safe rollout (migrate first, then commit+restart)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLIENT_P12_BASE64: ${{ secrets.CLIENT_P12_BASE64 }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          API_PUBLIC_BASE_URL: ${{ env.API_PUBLIC_BASE_URL }}
          SQUARE_CLOUD_API_TOKEN: ${{ secrets.SQUARE_CLOUD_API_TOKEN }}
          SQUARE_CLOUD_APP_ID: ${{ secrets.SQUARE_CLOUD_APP_ID }}
        run: bash deploy/scripts/squarecloud-rollout.sh

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure() && github.event.before != '' && github.event.before != '0000000000000000000000000000000000000000'
    env:
      API_PUBLIC_BASE_URL: https://pixflow.squareweb.app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.before }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (rollback commit)
        run: npm ci

      - name: Build rollback artifact
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Rollback to previous main commit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLIENT_P12_BASE64: ${{ secrets.CLIENT_P12_BASE64 }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          API_PUBLIC_BASE_URL: ${{ env.API_PUBLIC_BASE_URL }}
          SQUARE_CLOUD_API_TOKEN: ${{ secrets.SQUARE_CLOUD_API_TOKEN }}
          SQUARE_CLOUD_APP_ID: ${{ secrets.SQUARE_CLOUD_APP_ID }}
          ROLLBACK_MODE: '1'
        run: bash deploy/scripts/squarecloud-rollout.sh
