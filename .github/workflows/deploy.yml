name: Deploy to Square Cloud

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      API_PUBLIC_BASE_URL: https://pixflow.squareweb.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --foreground-scripts

      - name: Build
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Production dependencies for Square Cloud
        run: bash deploy/scripts/prepare-production-deps.sh

      - name: Prepare Square Cloud deploy artifacts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLIENT_P12_BASE64: ${{ secrets.CLIENT_P12_BASE64 }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          API_PUBLIC_BASE_URL: ${{ env.API_PUBLIC_BASE_URL }}
        run: bash deploy/scripts/prepare-squarecloud-deploy.sh

      - name: Database migrations
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          export DATABASE_URL="$(cat .ci-migrate-database-url)"
          npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      - name: Build Square Cloud prebuilt package
        run: bash deploy/scripts/build-squarecloud-package.sh

      - name: Deploy to Square Cloud
        env:
          SQUARE_CLOUD_API_TOKEN: ${{ secrets.SQUARE_CLOUD_API_TOKEN }}
          SQUARE_CLOUD_APP_ID: ${{ secrets.SQUARE_CLOUD_APP_ID }}
        run: bash deploy/scripts/squarecloud-commit.sh deploy/artifacts/pixflow-prebuilt.zip

      - name: Verify deploy
        if: success()
        run: |
          echo "Waiting for app startup..."
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 25 "${API_PUBLIC_BASE_URL}/health" >/dev/null 2>&1; then
              echo "Health OK on attempt ${attempt}"
              DB_HEALTH="$(curl -fsS --max-time 25 "${API_PUBLIC_BASE_URL}/health/db")"
              echo "$DB_HEALTH"
              echo "$DB_HEALTH" | grep -q '"ok":true'
              HEALTH="$(curl -fsS --max-time 25 "${API_PUBLIC_BASE_URL}/health")"
              echo "Production /health: $HEALTH"
              exit 0
            fi
            echo "Attempt ${attempt}/30: API not ready yet, sleeping 15s..."
            sleep 15
          done
          echo "::error::Health check failed after 30 attempts (~7.5 min)"
          curl -v --max-time 25 "${API_PUBLIC_BASE_URL}/health" || true
          exit 1
