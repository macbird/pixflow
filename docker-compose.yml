version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: iptv-manager-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iptv_manager
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: iptv-manager-redis
    restart: always
    ports:
      - "6380:6379"

volumes:
  postgres_data:
